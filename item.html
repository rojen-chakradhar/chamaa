<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>चmaa</title>
    <link rel="shortcut icon" href="./assets/images/Square Logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/global.css">
    <link rel="stylesheet" href="./styles/item.css">
    <link rel="stylesheet" href="./styles/header.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <li class="nav-link"><a href="./index.html#" class="active">home</a></li>
        <li class="nav-link"><a href="./about.html">about</a></li>
        <li class="nav-link"><a href="./catalog.html">catalog</a></li>
      </nav>
      <a href="./index.html">
        <img src="./assets/images/Horizontal Logo.png" alt="logo" class="nav-logo">
      </a>
      <nav class="navbar">
        <li class="nav-link"><a href="./services.html">services</a></li>
        <li class="nav-link"><a href="./faq.html">faq</a></li>
        <a href="./catalog.html">
          <button class="nav-cta">buy now</button>
        </a>
      </nav>
    </header>
    <main>
      <section class="hero">
        <article class="left-hero hero-container">
          <img src="./assets/images/Square Logo.png" alt="hero image" class="hero-image">
        </article>
        <article class="right-hero hero-container">
          <h2 class="heading">brownies</h2>
          <p class="tagline">delicious</p>
          <p class="price">Rs 200</p>
        </article>
      </section>
    </main>
    <script>
      let itemImage = document.querySelector("hero-image");
      let itemName = document.querySelector("heading");
      let itemTagline = document.querySelector("tagline");
      let itemPrice = document.querySelector("price");
      itemImage.innerHTML= localStorage.getItem("image");
      itemName.textContent= localStorage.getItem("name");
      itemTagline.textContent= localStorage.getItem("description");
      itemPrice.textContent= localStorage.getItem("price");
    </script>
  </body>
</html>
